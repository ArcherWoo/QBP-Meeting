{% macro icon(name, class='') -%}
<span class="svg-icon{% if class %} {{ class }}{% endif %}" aria-hidden="true">

        <circle cx="12" cy="12" r="9"></circle><path d="M12 8v8M8 12h8"></path>

        <rect x="4" y="5" width="16" height="14" rx="1"></rect><path d="M4 10h16M9 5v14"></path>

        <circle cx="12" cy="12" r="9"></circle><path d="M12 10v6"></path><path d="M12 7h.01"></path>
        {% elif name == 'save' %}
        <path d="M5 4h12l2 2v14H5V4z"></path><path d="M8 4v6h8"></path><path d="M8 16h8"></path>
        {% elif name == 'minutes' %}
        <path d="M8 4h8l2 2v14H6V4h2z"></path><path d="M9 10h6M9 14h6M9 18h4"></path>

        <path d="M12 4v12"></path><path d="M7 11l5 5 5-5"></path><path d="M5 20h14"></path>

        <path d="M14 5h5v5"></path><path d="M19 5l-8 8"></path><path d="M19 14v5H5V5h5"></path>

        <circle cx="12" cy="12" r="8"></circle>
        {% endif %}
