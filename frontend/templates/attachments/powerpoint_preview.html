<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>PowerPoint Preview - {{ attachment.original_filename }}</title>
    <style>
        body { margin: 0; font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif; background: #eef1f5; color: #1f2937; }
        .preview-shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
        .preview-bar { background: #2f5da8; color: #fff; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
        .preview-stage { display: grid; place-items: center; padding: 24px; }
        .message { width: min(760px, 94vw); background: #fff; border-radius: 6px; box-shadow: 0 6px 24px rgba(15,23,42,.16); padding: 32px; }
        h1 { color: #2f5da8; margin: 0 0 16px; font-size: 28px; }
        p { font-size: 16px; line-height: 1.7; color: #475569; }
        .error { color: #b91c1c; font-weight: 700; }
        a { color: #fff; }
    </style>
</head>
<body>
    <div class="preview-shell">
        <div class="preview-bar">
            <strong>PowerPoint Preview</strong>
            <a href="{{ url_for('attachment_download', attachment_id=attachment.id) }}">下载原始 PPT</a>
        </div>
        <div class="preview-stage">
            <div class="message">
                <h1>PowerPoint 预览生成失败</h1>
                <p class="error">{{ error }}</p>
                <p>系统会优先调用本机 Microsoft PowerPoint，把 PPT/PPTX 转成高清 PDF 后再预览。请确认服务器安装了 PowerPoint，并且上传文件本身可以正常打开。</p>
                <p>文件类型：{{ attachment.effective_file_type|upper }} | 文件大小：{{ (attachment.file_size / 1024)|round(1) }} KB</p>
            </div>
        </div>
    </div>
</body>
</html>
